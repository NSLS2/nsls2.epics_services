---
# Shared collection defaults — single source of truth for variables
# used across multiple roles. Loaded via include_vars (precedence 18).
# Orchestration set_fact (19) and extra_vars (20) can still override.

# === Installation policy ===
# When true, dependency roles use only RPM packages and will fail rather
# than falling back to non-RPM methods (tarball downloads, source builds,
# Maven JAR downloads).  Third-party RPM repos (e.g. Adoptium for JDK)
# are still permitted because they use the system package manager.
#
# Default: auto-detected — true on RHEL/CentOS 10+ where all required
# RPMs ship at the correct versions, false on older RHEL or non-RPM
# distributions where fallbacks are needed.
# Override in inventory/group_vars/extra_vars if your hosts differ.
epics_services_rpm_only: >-
  {{ ansible_os_family == 'RedHat'
     and ansible_distribution_major_version | int >= 10 }}

# === Shared account ===
epics_services_account: csstudio

# === Dependency versions ===
# These serve dual purpose:
#   - Pinned versions: used for tarball downloads and external repo installs
#   - When an RPM is available, these are the fallback versions if the RPM
#     is unavailable or does not meet minimum requirements.
#
# Minimum requirements (enforced by dependency roles):
#   JDK:           >= 25  (embedded in RPM name: java-25-openjdk)
#   Tomcat:        >= 10  (Jakarta EE — javax.servlet removed in Tomcat 10)
#   Elasticsearch: pinned (external repo + versionlock)
#   MongoDB:       pinned (external repo + versionlock)
#   Kafka:         pinned (tarball download)
#   Maven:         pinned (tarball download)
#   Node.js:       pinned (NodeSource repo)
#   MariaDB JDBC:  any    (2.x and 3.x both compatible)
jdk_version: 25
elastic_version: "9.0.0"
kafka_version: "3.9.2"
kafka_scala_version: "2.13"
maven_version: "3.9.9"
mongodb_version: "8.0"
nodejs_version: 21
tomcat_version: "10.1.34"
tomcat_min_major_version: 10

# === Service versions ===
# Pinned to release tags. Built from source on the target host.
cs_studio_phoebus_version: "v5.0.2"
phoebus_olog_version: "v6.0.1"
phoebus_olog_webclient_version: "v2.7.0"
cf_version: "ChannelFinder-5.0.0"
phoebus_alarm_server_version: "5.0.2"
phoebus_alarm_logger_version: "5.0.2"
phoebus_alarm_config_logger_version: "5.0.2"
save_restore_version: "5.0.2"
aa_version: "2.3.1"
recsync_version: master
pvws_version: master
dbwr_version: main

# === Maven plugin versions (used in Phoebus product POM files) ===
maven_jar_plugin_version: "3.1.0"
maven_resources_plugin_version: "3.1.0"
maven_exec_plugin_version: "1.6.0"
maven_assembly_plugin_version: "3.2.0"

# === Derived paths ===
java_home: "/usr/lib/jvm/java-{{ jdk_version }}-openjdk"
mvn_home: "/opt/epics-tools/lib/apache-maven-{{ maven_version }}"
kafka_install_dir: "/opt/epics-tools/services/kafka"
cs_studio_phoebus_products_dest: "/opt/css/phoebus-products"
phoebus_logback: "{{ cs_studio_phoebus_products_dest }}/config/logback.xml"

# === Dependency connections ===
es_host: localhost
es_port: 9200
elastic_port: 9200
kafka_server: localhost
kafka_port: 9092
zookeeper_port: 2181
mongod_host: localhost
mongod_port: 27017

# === Elasticsearch ===
elastic_heap_size: "4g"
elastic_cluster_name: elasticsearch
elastic_data: /var/lib/elasticsearch
elastic_logs: /var/log/elasticsearch

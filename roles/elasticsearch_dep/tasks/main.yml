---
- name: Load shared collection defaults
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../../vars/shared.yml"

# tasks file for elasticsearch_dep

- name: Install Elasticsearch (run once per play)
  when: not (_elasticsearch_dependency_done | default(false))
  block:
    - name: Import Elasticsearch GPG key
      become: true
      ansible.builtin.rpm_key:
        key: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        state: present
      register: _es_gpg_key
      ignore_errors: true

    - name: Check if Elasticsearch GPG key is already imported
      ansible.builtin.shell:
        cmd: rpm -q gpg-pubkey --qf '%{SUMMARY}\n' | grep -qi 'Elasticsearch'
      register: _es_gpg_check
      changed_when: false
      failed_when: false
      when: _es_gpg_key is failed

    - name: Import Elasticsearch GPG key (fallback for OpenPGP v6)
      become: true
      ansible.builtin.command:
        cmd: rpm --import https://artifacts.elastic.co/GPG-KEY-elasticsearch
      when:
        - _es_gpg_key is failed
        - _es_gpg_check.rc != 0
      changed_when: true

    - name: Add Elasticsearch yum repository
      become: true
      ansible.builtin.template:
        src: elasticsearch.repo.j2
        dest: /etc/yum.repos.d/elasticsearch.repo
        mode: "0644"
        owner: root
        group: root

    # --- Version-lock: prevent dnf-automatic from upgrading between runs ---

    - name: Ensure dnf versionlock plugin is installed
      become: true
      ansible.builtin.package:
        name: python3-dnf-plugin-versionlock
        state: present

    - name: Check currently installed Elasticsearch version
      ansible.builtin.command:
        cmd: rpm -q --qf '%{VERSION}' elasticsearch
      register: _es_installed_version
      changed_when: false
      failed_when: false

    - name: Clear Elasticsearch versionlock (version change)
      become: true
      ansible.builtin.command:
        cmd: dnf versionlock delete elasticsearch
      when:
        - _es_installed_version.rc == 0
        - _es_installed_version.stdout != elastic_version
      changed_when: true

    - name: Install Elasticsearch {{ elastic_version }}
      become: true
      ansible.builtin.dnf:
        name: "elasticsearch-{{ elastic_version }}"
        state: present
        allow_downgrade: true
      register: _es_install
      notify:
        - Restart elasticsearch

    - name: Lock Elasticsearch version
      become: true
      ansible.builtin.command:
        cmd: dnf versionlock add elasticsearch
      when: _es_install.changed
      changed_when: true

    # --- Keystore management (version-aware) ---

    - name: Check keystore version marker
      ansible.builtin.slurp:
        src: /etc/elasticsearch/.keystore_version
      register: _es_keystore_version_file
      failed_when: false

    - name: Reset Elasticsearch keystore (first install or version change)
      become: true
      ansible.builtin.command:
        cmd: /usr/share/elasticsearch/bin/elasticsearch-keystore create
        stdin: "y"
      register: _es_keystore_reset
      when: >-
        _es_keystore_version_file is failed or
        (_es_keystore_version_file.content | default('') | b64decode | trim) != elastic_version
      notify:
        - Restart elasticsearch

    - name: Record keystore version marker  # noqa: no-handler
      become: true
      ansible.builtin.copy:
        content: "{{ elastic_version }}\n"
        dest: /etc/elasticsearch/.keystore_version
        mode: "0644"
        owner: root
        group: elasticsearch
      when: _es_keystore_reset is changed

    - name: Ensure data directory exists
      become: true
      ansible.builtin.file:
        path: "{{ elastic_data }}"
        state: directory
        owner: elasticsearch
        group: elasticsearch
        mode: "0750"

    - name: Ensure log directory exists
      become: true
      ansible.builtin.file:
        path: "{{ elastic_logs }}"
        state: directory
        owner: elasticsearch
        group: elasticsearch
        mode: "0750"

    - name: Install the elasticsearch configuration
      become: true
      ansible.builtin.template:
        src: elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        mode: "0660"
        owner: root
        group: elasticsearch
      notify:
        - Restart elasticsearch

    - name: Configure Elasticsearch JVM heap size
      become: true
      ansible.builtin.template:
        src: jvm_heap.options.j2
        dest: /etc/elasticsearch/jvm.options.d/heap.options
        mode: "0644"
        owner: root
        group: elasticsearch
      notify:
        - Restart elasticsearch

    - name: Enable elasticsearch service
      become: true
      ansible.builtin.systemd:
        name: elasticsearch
        enabled: true

    - name: Mark elasticsearch dependency done
      ansible.builtin.set_fact:
        _elasticsearch_dependency_done: true

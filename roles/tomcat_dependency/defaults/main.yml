---
tomcat_ver: 9.0.104
tomcat_archive_url: https://archive.apache.org/dist/tomcat/tomcat-9/v{{ tomcat_ver }}/bin/apache-tomcat-{{ tomcat_ver }}.tar.gz
tomcat_archive_dest: /tmp/apache-tomcat-{{ tomcat_ver }}.tar.gz

tomcat_dest: /opt/epics-tools/services/tomcat
tomcat_service_name: tomcat
tomcat_http_port: 7070
tomcat_redirect_port: 8443
tomcat_ajp_port: 8009
tomcat_bind_addr: localhost
tomcat_shutdown_port: 7005

ui_manager_user: manager                    # User who can access the UI manager section only
ui_manager_pass: Str0ngManagerP@ssw3rd      # UI manager user password
ui_admin_username: admin                    # User who can access bpth manager and admin UI sections
ui_admin_pass: Str0ngAdminP@ssw3rd          # UI admin password

# JAVA HOME
java_home: "/usr/lib/jvm/java-17-openjdk"

epics_services_account: csstudio

# SSL/TLS configuration (NIO connector, no APR needed)
tomcat_ssl_enabled: false
tomcat_ssl_port: 4443
tomcat_ssl_keystore_file: ""
tomcat_ssl_keystore_password: "changeit"

# APR lifecycle listener (not needed for NIO SSL)
tomcat_apr_enabled: false

# Health check valve (provides /health endpoint, requires Tomcat >= 9.0.55)
tomcat_health_check_enabled: false

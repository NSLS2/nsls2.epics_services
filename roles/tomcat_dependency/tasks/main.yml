---
- name: Add EPEL repository
  yum:
    name: epel-release
    state: present

- name: Install basic packages
  package:
    name: ['vim','bash-completion','tmux','tree','htop','wget','unzip','curl','git']
    state: present

# TODO use the tomcat user
- name: Add tomcat group
  group:
    name: tomcat

- name: Add "tomcat" user
  user:
    name: tomcat
    group: tomcat
    home: "{{ tomcat_dest }}"
    createhome: no
    system: yes

- name: Download Tomcat
  get_url:
    url: "{{ tomcat_archive_url }}"
    dest: "{{ tomcat_archive_dest }}"

- name: Create a tomcat directory
  file:
    path: "{{ tomcat_dest }}"
    state: directory
    owner:  "{{ epics_services_account }}"
    group:  "{{ epics_services_account }}"

- name: Extract tomcat archive
  unarchive:
    src: "{{ tomcat_archive_dest }}"
    dest: "{{ tomcat_dest }}"
    owner:  "{{ epics_services_account }}"
    group:  "{{ epics_services_account }}"
    remote_src: yes
    extra_opts: "--strip-components=1"
    creates: "{{ tomcat_dest }}/bin"

- name: Copy tomcat service file
  template:
    src: templates/tomcat.service.j2
    dest: "/etc/systemd/system/{{ tomcat_service_name }}.service"
  when: ansible_service_mgr == "systemd"

- name: Validate SSL keystore file is set when SSL is enabled
  assert:
    that:
      - tomcat_ssl_keystore_file | length > 0
    fail_msg: "tomcat_ssl_keystore_file must be set when tomcat_ssl_enabled is true"
  when: tomcat_ssl_enabled | bool

- name: Set ports and other server configuration
  template:
    src: server.xml.j2
    dest: "{{ tomcat_dest }}/conf/server.xml"
    owner:  "{{ epics_services_account }}"
    group:  "{{ epics_services_account }}"
  notify: restart tomcat

- name: Start and enable tomcat
  service:
    daemon_reload: yes
    name: "{{ tomcat_service_name }}"
    state: started
    enabled: yes
  when: ansible_service_mgr == "systemd"

- name: Set UI access credentials
  template:
    src: tomcat-users.xml.j2
    dest: "{{ tomcat_dest }}/conf/tomcat-users.xml"
  notify: restart tomcat

- name: Allow access to Manager and Host Manager apps from any IP
  template:
    src: context.xml.j2
    dest: "{{ item }}"
  with_items:
    - "{{ tomcat_dest }}/webapps/host-manager/META-INF/context.xml"
    - "{{ tomcat_dest }}/webapps/manager/META-INF/context.xml"
  notify: restart tomcat

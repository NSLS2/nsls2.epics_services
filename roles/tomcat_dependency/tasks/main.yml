---
- name: Load shared collection defaults
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../../vars/shared.yml"

- name: Install Tomcat (run once per play)
  when: not (_tomcat_dependency_done | default(false))
  block:
    - name: Install Tomcat via RPM
      become: true
      ansible.builtin.package:
        name:
          - tomcat
        state: present

    - name: Mark tomcat dependency done
      ansible.builtin.set_fact:
        _tomcat_dependency_done: true

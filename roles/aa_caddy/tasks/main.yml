---
# Caddy reverse proxy for Archiver Appliance cluster TLS termination

- name: Install Caddy
  become: true
  ansible.builtin.package:
    name: caddy
    state: present

- name: Deploy Caddyfile
  become: true
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: caddy
    mode: '0644'
  notify: Restart caddy

- name: Validate Caddy configuration
  become: true
  ansible.builtin.command:
    cmd: caddy validate --config /etc/caddy/Caddyfile
  changed_when: false

- name: Ensure Caddy is started and enabled
  become: true
  ansible.builtin.service:
    name: caddy
    state: started
    enabled: true

---
# tasks file for kafka_dependency

- name: Ensure kafka services directory exists
  ansible.builtin.file:
    path: {{ kafka_install_dir }}
    state: directory
    mode: '0775'
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"

- name: Install kafka
  ansible.builtin.unarchive:
    src: https://downloads.apache.org/kafka/3.9.0/kafka_2.13-3.9.0.tgz
    dest: {{ kafka_install_dir }}
    remote_src: true
    mode: '0775'
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    extra_opts:
      - --strip-components=1
  notify:
    - Restart zookeeper
    - Restart kafka

- name: Ensure kafka logs directory has correct ownership
  become: true
  ansible.builtin.file:
    path: {{ kafka_install_dir }}/logs
    state: directory
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    recurse: true

- name: Install the zookeeper configuration
  become: true
  ansible.builtin.template:
    src: zookeeper.properties
    dest: {{ kafka_install_dir }}/config/zookeeper.properties
    mode: '0644'
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  notify:
    - Restart zookeeper

- name: Install the kafka configuration
  become: true
  ansible.builtin.template:
    src: server.properties
    dest: {{ kafka_install_dir }}/config/server.properties
    mode: '0644'
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  notify:
    - Restart kafka

- name: Install the zookeeper systemd service
  become: true
  ansible.builtin.template:
    src: zookeeper.service
    dest: /etc/systemd/system/zookeeper.service
    mode: '0644'
    owner: root
    group: root
  notify:
    - Reload systemd daemon
    - Restart zookeeper

- name: Install the kafka systemd service
  become: true
  ansible.builtin.template:
    src: kafka.service
    dest: /etc/systemd/system/kafka.service
    mode: '0644'
    owner: root
    group: root
  notify:
    - Reload systemd daemon
    - Restart kafka

---
# tasks file for aa_cluster_service
# Thin orchestrator - delegates to composable sub-roles

- name: Install JDK 17
  ansible.builtin.include_role:
    name: nsls2.epics_services.jdk_dependency

- name: Install dependencies (Tomcat, MySQL connector)
  ansible.builtin.include_role:
    name: nsls2.epics_services.aa_dependency

- name: Configure local MariaDB
  ansible.builtin.include_role:
    name: nsls2.epics_services.aa_mysql_dependency

- name: Build Archiver Appliance
  ansible.builtin.include_role:
    name: nsls2.epics_services.aa_build

- name: Deploy Archiver Appliance
  ansible.builtin.include_role:
    name: nsls2.epics_services.aa_deploy

- name: Configure Caddy reverse proxy
  ansible.builtin.include_role:
    name: nsls2.epics_services.aa_caddy

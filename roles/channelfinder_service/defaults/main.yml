---
# defaults file for channelfinder_service

epics_services_account: csstudio

channelfinder_install_dir: /opt/epics-tools/services/channelfinder

cf_http_port: 8080
cf_https_port: 8443
# Channel Finder version
cf_version: ChannelFinder-4.7.3

cf_java_home: "/usr/lib/jvm/java-21-openjdk"
cf_mvn_home: "/opt/epics-tools/lib/apache-maven-3.9.9"

# Path to logback configuration
phoebus_logback: "/opt/css/phoebus-products/config/logback.xml"

es_host: "localhost"
es_port: 9200

# procServ port
cf_procServ_port: 60051

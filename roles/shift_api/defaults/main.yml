---
# epics_services_account in vars/shared.yml

shift_install_dir: /opt/epics-tools/services/shift

http_port: 8080
https_port: 8443
admin_port: 4848

# Shift MySQL database connection info
shift_jdbc_server: "localhost"
shift_jdbc_dbname: "shift"
shift_jdbc_user: "shift"
shift_jdbc_password: "shift"
configure_mysql: true

# JAVA HOME (JDK 8 — separate from java_home used by JDK 21 services)
shift_java_home: "/usr/lib/jvm/java-1.8.0-openjdk"

# MariaDB JDBC connector JAR — auto-detected from mariadb_dep
shift_mysql_connector_jar: "{{ mariadb_connector_jar | default('/usr/lib/java/mariadb-java-client.jar') }}"

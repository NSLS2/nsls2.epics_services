---
# defaults file for save_restore_service
#
# Override organization-specific values in your inventory:
#   ad_url: "ldap://your-ad-server.example.com"
#   ad_domain: "example.com"

epics_services_account: csstudio

save_restore_java_home: "{{ java_home }}"

save_restore_install_dir: /opt/epics-tools/services/save_restore

save_restore_version: "4.7.4"
save_restore_jar: "{{ save_restore_install_dir }}/service-save-and-restore-{{ save_restore_version }}.jar"

save_restore_http_port: 8080
save_restore_https_port: 8443

# Path to logback configuration
phoebus_logback: "/opt/css/phoebus-products/config/logback.xml"

# Elasticsearch info
es_host: "localhost"
es_port: 9200

## procServ port
save_restore_procServ_port: "60050"

# Active Directory configuration (organization-specific)
ad_enabled: true
ad_url: ""
ad_domain: ""

---

# JDK versions to install via RHEL OpenJDK RPM packages
jdk_packages:
  - { version: "8", package: "java-1.8.0-openjdk-devel", rpm_path: "/usr/lib/jvm/java-1.8.0-openjdk" }
  - { version: "11", package: "java-11-openjdk-devel", rpm_path: "/usr/lib/jvm/java-11-openjdk" }
  - { version: "17", package: "java-17-openjdk-devel", rpm_path: "/usr/lib/jvm/java-17-openjdk" }

# Symlink base path — other roles reference /opt/epics-tools/lib/jvm/jdk-{version}
jdk_symlink_base: "/opt/epics-tools/lib/jvm"

# Maven (no good RPM available, keep tarball install)
maven_version: "3.9.9"
maven_url: "https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz"

epics_tools_libs_epics_services_account: csstudio

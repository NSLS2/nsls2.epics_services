---
# Install JDK 8 — OpenJDK on RHEL < 10, Adoptium Temurin on RHEL 10+
# (RHEL 10 dropped java-1.8.0-openjdk)

- name: Install OpenJDK 8 (RHEL < 10)
  become: true
  ansible.builtin.package:
    name: java-1.8.0-openjdk-devel
    state: present
  when: ansible_distribution_major_version | int < 10

- name: Import Adoptium GPG key (RHEL 10+)
  become: true
  ansible.builtin.rpm_key:
    key: https://packages.adoptium.net/artifactory/api/gpg/key/public
    state: present
  register: _adoptium_gpg_key
  ignore_errors: true
  when: ansible_distribution_major_version | int >= 10

- name: Check if Adoptium GPG key is already imported (RHEL 10+)
  ansible.builtin.shell:
    cmd: rpm -q gpg-pubkey --qf '%{SUMMARY}\n' | grep -qi 'Adoptium'
  register: _adoptium_gpg_check
  changed_when: false
  failed_when: false
  when:
    - ansible_distribution_major_version | int >= 10
    - _adoptium_gpg_key is failed

- name: Import Adoptium GPG key — fallback for OpenPGP v6 (RHEL 10+)
  become: true
  ansible.builtin.command:
    cmd: rpm --import https://packages.adoptium.net/artifactory/api/gpg/key/public
  when:
    - ansible_distribution_major_version | int >= 10
    - _adoptium_gpg_key is failed
    - _adoptium_gpg_check.rc != 0
  changed_when: true

- name: Add Adoptium Temurin repository (RHEL 10+)
  become: true
  ansible.builtin.yum_repository:
    name: Adoptium
    description: Adoptium Temurin
    baseurl: https://packages.adoptium.net/artifactory/rpm/rhel/$releasever/$basearch
    gpgcheck: true
    gpgkey: https://packages.adoptium.net/artifactory/api/gpg/key/public
    enabled: true
  when: ansible_distribution_major_version | int >= 10

- name: Install Temurin JDK 8 (RHEL 10+)
  become: true
  ansible.builtin.package:
    name: temurin-8-jdk
    state: present
  when: ansible_distribution_major_version | int >= 10

- name: Set shift_java_home for Temurin (RHEL 10+)
  ansible.builtin.set_fact:
    shift_java_home: "{{ jdk8_java_home_temurin }}"
  when: ansible_distribution_major_version | int >= 10

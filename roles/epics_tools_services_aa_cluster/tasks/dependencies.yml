---
# Download dependencies

- name: Install JDK via RPM
  package:
    name:
      - java-17-openjdk
      - java-17-openjdk-devel  # Required for JNI headers (jni_md.h)
    state: present

- name: Set JDK home fact from RPM installation
  set_fact:
    java_home_rpm: "/usr/lib/jvm/java-17-openjdk"

- name: Install APR and SSL libraries for Tomcat Native
  package:
    name:
      - apr
      - apr-util
      - apr-devel
      - apr-util-devel
      - openssl-devel  # Headers for SSL support (openssl runtime already in base system)
      - gcc
      - make
    state: present

- name: Install Tomcat and Tomcat Native via RPM
  package:
    name:
      - tomcat
      - tomcat-native
    state: present

- name: ensure aa_depndecies directory exists
  file:
    path: "{{ aa_dependencies_loc }}"
    state: directory
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    
- name: Download mysql-connector
  get_url:
    url: https://cdn.mysql.com/archives/mysql-connector-java-5.1/mysql-connector-java-5.1.34.tar.gz
    dest: "{{ aa_dependencies_loc }}/mysql-connector-java-5.1.34.tar.gz"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
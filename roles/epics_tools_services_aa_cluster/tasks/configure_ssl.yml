---
# SSL/TLS Certificate Configuration for Archiver Appliance

- name: Check if SSL certificate files exist
  stat:
    path: "{{ item }}"
  register: ssl_cert_check
  loop:
    - "{{ aa_ssl_cert_file }}"
    - "{{ aa_ssl_key_file }}"

- name: Warning if SSL certificates are missing
  debug:
    msg: |
      WARNING: SSL certificates are missing!
      Please ensure the following files exist before starting Tomcat:
        - Certificate: {{ aa_ssl_cert_file }}
        - Private Key: {{ aa_ssl_key_file }}
        - Chain (optional): {{ aa_ssl_chain_file }}

      Use the acme_certificates role to generate proper certificates.
  when: ssl_cert_check.results | selectattr('stat.exists', 'equalto', false) | list | length > 0

- name: Set correct permissions on SSL private key
  file:
    path: "{{ aa_ssl_key_file }}"
    mode: '0600'
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  when: ssl_cert_check.results[1].stat.exists | default(false)

- name: Set correct permissions on SSL certificate
  file:
    path: "{{ aa_ssl_cert_file }}"
    mode: '0644'
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  when: ssl_cert_check.results[0].stat.exists | default(false)

- name: Import CA certificate chain into Java truststore
  community.general.java_cert:
    cert_path: "{{ aa_ssl_chain_file }}"
    cert_alias: nsls2-ca
    keystore_path: "{{ aa_java_home }}/lib/security/cacerts"
    keystore_pass: changeit
    state: present
  become: true
  when: aa_ssl_chain_file is defined

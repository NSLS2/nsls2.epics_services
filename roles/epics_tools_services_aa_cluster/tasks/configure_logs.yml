---
# Configure log directories for AA services

- name: Create log directories
  ansible.builtin.file:
    path: "{{ aa_logs_base_dir }}/{{ item }}"
    state: directory
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0755'
  loop:
    - mgmt
    - engine
    - etl
    - retrieval

- name: Deploy log4j2.xml from template for all services
  ansible.builtin.template:
    src: log4j2.xml.j2
    dest: "{{ aa_deploy_location }}/{{ item }}/webapps/{{ item }}/WEB-INF/classes/log4j2.xml"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0644'
  vars:
    service_name: "{{ item }}"
  loop:
    - mgmt
    - engine
    - etl
    - retrieval

- name: Set permissions on log directories
  ansible.builtin.file:
    path: "{{ aa_logs_base_dir }}"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    recurse: true

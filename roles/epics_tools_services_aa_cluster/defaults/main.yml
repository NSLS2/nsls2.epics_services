---
# defaults file for epics_tools_services_aa_cluster

beamline_name: tst
beamline_id: "31"

epics_services_account: "epics-services-{{ beamline_name }}"

# JDK and Tomcat configuration (using system RPM installation)
default_jdk_version: "17"
aa_tomcat_home: "/usr/share/tomcat"

aa_dependencies_loc: /tmp/aa_{{ beamline_name }}_dependencies
aa_build_loc: /tmp/aa_{{ beamline_name }}_build
aa_version: 2.2.1

# Installation and deployment locations
aa_install_location: "/opt/epics-tools/services/{{ beamline_name }}/aa/install"
aa_deploy_location: "/opt/epics-tools/services/{{ beamline_name }}/aa/deploy"

# Archiver Appliance MySQL info (each node has its own database)
aa_mysql_server: "localhost"
aa_mysql_database: "{{ beamline_name }}_archappl"
aa_mysql_user: "{{ beamline_name }}_archappl"
aa_mysql_password: "{{ beamline_name }}_archappl"

# Archiver Identity - MUST be unique per node (appliance0, appliance1, appliance2)
aa_identity: appliance0

# Cluster communication port (same on all nodes)
cluster_inetport: "1{{ beamline_id }}70"

# HTTP ports for each component (Caddy handles TLS on port 443)
mgmt_port: "1{{ beamline_id }}65"
engine_port: "1{{ beamline_id }}66"
etl_port: "1{{ beamline_id }}67"
data_retrieval_port: "1{{ beamline_id }}68"

# Caddy TLS certificate paths (must be provided per-deployment)
aa_caddy_tls_cert: ""
aa_caddy_tls_key: ""

# Archiver channel access options (organization-specific broadcast address)
aa_epics_ca_addr_list: ""

# Archiver Java Options
# java_home_rpm is set by dependencies.yml task
aa_java_home: "{{ java_home_rpm | default('/usr/lib/jvm/java-' ~ default_jdk_version ~ '-openjdk') }}"
aa_java_opts_engine: "-XX:+UseG1GC -Xmx10G -Xms4G -ea"
aa_java_opts_retrieval: "-XX:+UseG1GC -Xmx10G -Xms4G -ea"
aa_java_opts_etl: "-XX:+UseG1GC -Xmx5G -Xms1G -ea"
aa_java_opts_mgmt: "-XX:+UseG1GC -Xmx5G -Xms1G -ea"

# AA Data Storage Locations
# aa_sts: "/dev/shm/archappl/{{ beamline_name }}/sts/ArchiverStore"
# aa_mts: "/nsls2/data/{{ beamline_name }}/mts/ArchiverStore"
# aa_lts: "/nsls2/data/{{ beamline_name }}/lts/ArchiverStore"

# Archiver Data Locations (testing on local disk)
aa_sts: "{{ aa_deploy_location }}/data/sts/ArchiverStore"
aa_mts: "{{ aa_deploy_location }}/data/mts/ArchiverStore"
aa_lts: "{{ aa_deploy_location }}/data/lts/ArchiverStore"

# Archiver Log Locations
aa_logs_base_dir: "/var/log/archiver-appliance"
aa_configure_custom_logs: true

# Systemd mount dependency (organization-specific)
# Example: "data-beamline.mount" - leave empty if no mount dependency needed
aa_data_mount_name: ""

# Cluster appliances configuration (organization-specific)
# This list MUST be identical on all nodes in the cluster
aa_cluster_appliances: []
# Example:
#  - identity: appliance0
#    hostname: archiver1.example.com
#    cluster_inetport: "{{ cluster_inetport }}"
#  - identity: appliance1
#    hostname: archiver2.example.com
#    cluster_inetport: "{{ cluster_inetport }}"

---
# Configuration for building and deploying Phoebus
#
# Override organization-specific values in your inventory:
#   cs_studio_phoebus_products_repo: "https://github.com/your-org/your-phoebus-products.git"
#   cs_studio_phoebus_jar: "/opt/css/phoebus-products/products/your-product/target/your-product.jar"

# Core Phoebus repository (upstream)
cs_studio_phoebus_repo: "https://github.com/ControlSystemStudio/phoebus.git"
cs_studio_phoebus_version: "master"
cs_studio_phoebus_dest: /opt/css/lib/phoebus

# Organization-specific Phoebus products repository
cs_studio_phoebus_products_repo: ""
cs_studio_phoebus_products_version: "main"
cs_studio_phoebus_products_dest: /opt/css/phoebus-products

# Build environment
cs_studio_phoebus_java_home: "/opt/epics-tools/lib/jvm/jdk-17"
cs_studio_phoebus_mvn_home: "/opt/epics-tools/lib/apache-maven-3.9.9"

# Runtime configuration (must be set per organization/beamline)
cs_studio_phoebus_jar: ""
cs_studio_phoebus_pref: ""
cs_studio_phoebus_logging: "{{ cs_studio_phoebus_products_dest }}/config/logging.properties"
cs_studio_phoebus_logback: "{{ cs_studio_phoebus_products_dest }}/config/logback.xml"

# Runtime options
cs_studio_phoebus_owner: "csstudio"
cs_studio_phoebus_override_mvn_settings: false
cs_studio_phoebus_force_gpu: false

---
- name: Load shared collection defaults
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../../vars/shared.yml"

- name: Install procServ (run once per play)
  when: not (_procserv_dependency_done | default(false))
  block:
    - name: Install procServ via RPM
      become: true
      ansible.builtin.package:
        name: procServ
        state: present
      register: _procserv_rpm
      ignore_errors: true

    - name: Set procserv_path for RPM install
      ansible.builtin.set_fact:
        procserv_path: "/usr/bin/procServ"
      when:
        - _procserv_rpm is succeeded
        - procserv_path is not defined

    - name: Fail when procServ RPM unavailable and rpm_only is set
      ansible.builtin.fail:
        msg: >-
          procServ RPM is not available and epics_services_rpm_only is true —
          source build fallback disabled.
      when:
        - _procserv_rpm is failed
        - epics_services_rpm_only | bool

    - name: Build procServ from source (fallback when RPM unavailable)
      when:
        - _procserv_rpm is failed
        - not (epics_services_rpm_only | bool)
      block:
        - name: Install build dependencies for procServ
          become: true
          ansible.builtin.package:
            name:
              - gcc
              - gcc-c++
              - make
              - autoconf
              - automake
              - libtelnet-devel
            state: present

        - name: Clone procServ source
          become: true
          ansible.builtin.git:
            repo: "https://github.com/ralphlange/procServ.git"
            dest: /usr/local/src/procServ
            version: "{{ procserv_version | default('master') }}"
            update: true
          register: _procserv_src

        - name: Build and install procServ
          become: true
          ansible.builtin.shell: |
            autoreconf -fi
            ./configure --prefix=/usr/local --disable-doc
            make -j$(nproc)
            make install
          args:
            chdir: /usr/local/src/procServ
            creates: /usr/local/bin/procServ

        - name: Set procserv_path for source install
          ansible.builtin.set_fact:
            procserv_path: "/usr/local/bin/procServ"
          when: procserv_path is not defined

    - name: Mark procserv dependency done
      ansible.builtin.set_fact:
        _procserv_dependency_done: true

---
# Shared vars (epics_services_account, cs_studio_phoebus_products_dest,
# phoebus_logback, es_host, es_port) in vars/shared.yml

channelfinder_install_dir: /opt/epics-tools/services/channelfinder

cf_http_port: 8080
cf_https_port: 8443
# cf_version in vars/shared.yml

cf_java_home: "{{ java_home }}"
cf_mvn_home: "{{ mvn_home }}"

# procServ port
cf_procServ_port: 60051

# Authentication backend selection (set by the orchestration role's set_fact
# block at precedence 19, which overrides these defaults). All false here so
# the role still renders a working cf.properties when included standalone --
# it falls back to upstream demo_auth defaults (admin/adminPass, user/userPass).
ad_enabled: false
ad_url: ""
ad_domain: ""
ldap_enabled: false
ldap_urls: ""
ldap_base_dn: ""

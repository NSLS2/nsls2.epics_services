---
- name: Load shared collection defaults
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../../vars/shared.yml"

- name: Install MariaDB JDBC (run once per play)
  when: not (_mariadb_dependency_done | default(false))
  block:
    - name: Install MariaDB JDBC connector via RPM
      become: true
      ansible.builtin.package:
        name:
          - mariadb-java-client
        state: present

    - name: Mark mariadb dependency done
      ansible.builtin.set_fact:
        _mariadb_dependency_done: true

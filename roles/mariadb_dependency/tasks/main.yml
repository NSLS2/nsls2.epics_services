---
- name: Load shared collection defaults
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../../vars/shared.yml"

- name: Install MariaDB JDBC (run once per play)
  when: not (_mariadb_dependency_done | default(false))
  block:
    - name: Install MariaDB JDBC connector via RPM
      become: true
      ansible.builtin.package:
        name: mariadb-java-client
        state: present
      register: _mariadb_rpm
      ignore_errors: true

    - name: Fail when MariaDB JDBC RPM unavailable and rpm_only is set
      ansible.builtin.fail:
        msg: >-
          mariadb-java-client RPM is not available and
          epics_services_rpm_only is true — Maven Central fallback disabled.
      when:
        - _mariadb_rpm is failed
        - epics_services_rpm_only | bool

    - name: Install MariaDB JDBC from Maven Central (fallback when RPM unavailable)
      when:
        - _mariadb_rpm is failed
        - not (epics_services_rpm_only | bool)
      block:
        - name: Ensure JAR directory exists
          become: true
          ansible.builtin.file:
            path: "{{ mariadb_connector_jar | dirname }}"
            state: directory
            mode: "0755"

        - name: Download MariaDB JDBC connector JAR
          become: true
          vars:
            _maven_base: "https://repo1.maven.org/maven2"
            _maven_path: "org/mariadb/jdbc/mariadb-java-client"
          ansible.builtin.get_url:
            url: "{{ _maven_base }}/{{ _maven_path }}/{{ mariadb_connector_version }}/mariadb-java-client-{{ mariadb_connector_version }}.jar"
            dest: "{{ mariadb_connector_jar }}"
            mode: "0644"

    - name: Export mariadb_connector_jar path
      ansible.builtin.set_fact:
        mariadb_connector_jar: "{{ mariadb_connector_jar }}"

    - name: Mark mariadb dependency done
      ansible.builtin.set_fact:
        _mariadb_dependency_done: true

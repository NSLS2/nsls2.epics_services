---
- name: Load shared collection defaults
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../../vars/shared.yml"

# === Runtime dependencies (shared by both install methods) ===
- name: Install Node.js
  ansible.builtin.include_role:
    name: nsls2.epics_services.nodejs_dependency
  when: not (skip_dependencies | default(false))

# === RPM install path ===
- name: Install Olog Web Client from RPM
  when: epics_services_use_rpms | bool
  block:
    - name: Install nsls2-olog-webclient RPM
      become: true
      ansible.builtin.package:
        name: "nsls2-olog-webclient-{{ phoebus_olog_webclient_version | regex_replace('^v', '') }}"
        state: present

# === Source build path (existing behavior) ===
- name: Build and deploy Olog Web Client from source
  when: not (epics_services_use_rpms | bool)
  block:
    # create the installation location for the Olog Webclient server
    - name: Ensure services folder exists
      ansible.builtin.file:
        path: "{{ phoebus_olog_webclient_install_dir }}"
        state: directory
        owner: "{{ epics_services_account }}"
        group: "{{ epics_services_account }}"
        mode: "0755"

    # Olog Webclient
    - name: Clone and/or update the Olog webclient repo
      become: true
      become_user: "{{ epics_services_account }}"
      ansible.builtin.git:
        repo: 'https://github.com/Olog/phoebus-olog-web-client.git'
        dest: "{{ phoebus_olog_webclient_project_path }}"
        force: true
        version: "{{ phoebus_olog_webclient_version }}"
        update: true
      register: _webclient_repo

    - name: Copy .env template file to the project folder
      become: true
      ansible.builtin.template:
        src: .env.j2
        dest: "{{ phoebus_olog_webclient_project_path }}/.env"
        mode: "0644"
        owner: "{{ epics_services_account }}"
        group: "{{ epics_services_account }}"

    - name: Install project dependencies with npm  # noqa: no-handler
      community.general.npm:
        path: "{{ phoebus_olog_webclient_project_path }}"
        production: false
      when: _webclient_repo.changed

    - name: Run npm build script  # noqa: no-changed-when no-handler
      ansible.builtin.command: npm run build
      args:
        chdir: "{{ phoebus_olog_webclient_project_path }}"
      when: _webclient_repo.changed

# === Configuration (runs regardless of install method) ===
- name: Include tasks to configure Olog Webclient systemd services
  ansible.builtin.include_tasks: configure_services.yml

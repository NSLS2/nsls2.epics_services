---
# defaults file for elasticsearch_dependency

beamline_name: tst

epics_services_account: csstudio

# Elasticsearch version (major.minor.patch for RPM pinning)
elastic_version: "8.12.0"

# Heap size for Elasticsearch JVM
elastic_heap_size: "4g"

# Port and data paths
elastic_port: 9200
elastic_data: /var/lib/elasticsearch/{{ beamline_name }}
elastic_logs: /var/log/elasticsearch/{{ beamline_name }}

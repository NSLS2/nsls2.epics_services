---
# configure the systemd services for the alarm services

- name: Install procServ
  ansible.builtin.include_role:
    name: nsls2.epics_services.procserv_dependency

# Alarm Server

- name: Create alarm server run script
  become: true
  ansible.builtin.template:
    src: run-phoebus-alarm.sh.j2
    dest: "{{ phoebus_alarm_install_dir }}/alarm_server/run-phoebus-alarm.sh"
    mode: "0755"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  notify:
    - Restart alarm server

- name: Create alarm server systemd service
  become: true
  ansible.builtin.template:
    src: phoebus_alarm.service.j2
    dest: /etc/systemd/system/phoebus_alarm.service
    mode: "0644"
    owner: root
    group: root
  notify:
    - Reload systemd daemon
    - Restart alarm server

# Alarm Logger

- name: Create alarm logger run script
  become: true
  ansible.builtin.template:
    src: run-phoebus-alarm-logger.sh.j2
    dest: "{{ phoebus_alarm_install_dir }}/alarm_logger/run-phoebus-alarm-logger.sh"
    mode: "0755"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  notify:
    - Restart alarm logger

- name: Create alarm logger systemd service
  become: true
  ansible.builtin.template:
    src: phoebus_alarm_logger.service.j2
    dest: /etc/systemd/system/phoebus_alarm_logger.service
    mode: "0644"
    owner: root
    group: root
  notify:
    - Reload systemd daemon
    - Restart alarm logger

# Alarm Config Logger

- name: Create alarm config logger run script
  become: true
  ansible.builtin.template:
    src: run-phoebus-alarm-config-logger.sh.j2
    dest: "{{ phoebus_alarm_install_dir }}/alarm_config_logger/run-phoebus-alarm-config-logger.sh"
    mode: "0755"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  notify:
    - Restart alarm config logger

- name: Create alarm config logger systemd service
  become: true
  ansible.builtin.template:
    src: phoebus_alarm_config_logger.service.j2
    dest: /etc/systemd/system/phoebus_alarm_config_logger.service

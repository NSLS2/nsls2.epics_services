---
- name: Load shared collection defaults
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../../vars/shared.yml"

# === Runtime dependencies (shared by both install methods) ===
- name: Install JDK dependency
  ansible.builtin.include_role:
    name: nsls2.epics_services.jdk_dep
  when: not (skip_dependencies | default(false))

- name: Install Tomcat dependency
  ansible.builtin.include_role:
    name: nsls2.epics_services.tomcat_dep
  when: not (skip_dependencies | default(false))

- name: Install MariaDB JDBC dependency
  ansible.builtin.include_role:
    name: nsls2.epics_services.mariadb_dep
  when: not (skip_dependencies | default(false))

# === RPM install path ===
- name: Install Archiver Appliance from RPM
  when: epics_services_use_rpms | bool
  block:
    - name: Install nsls2-archiver-appliance RPM (single or cluster)
      become: true
      ansible.builtin.package:
        name: "{{ aa_rpm_name | default('nsls2-archiver-appliance-single') }}-{{ aa_version }}"
        state: present

# === Source build path (existing behavior) ===
- name: Build Archiver Appliance from source
  when: not (epics_services_use_rpms | bool)
  block:
    - name: Build Archiver Appliance
      ansible.builtin.include_tasks: build.yml

# === Configuration (runs regardless of install method) ===
- name: Configure local MariaDB
  ansible.builtin.include_tasks: configure_mysql.yml

- name: Pre-upgrade data consolidation
  ansible.builtin.include_tasks: pre_upgrade.yml
  when: (_repo.changed | default(false)) and aa_pre_upgrade_consolidate | bool

- name: Deploy Archiver Appliance
  ansible.builtin.include_tasks: deploy.yml

- name: Post-upgrade PV resume
  ansible.builtin.include_tasks: post_upgrade.yml
  when: (_repo.changed | default(false)) and aa_pre_upgrade_consolidate | bool

- name: Configure custom logging
  ansible.builtin.include_tasks: configure_logging.yml
  when: aa_configure_custom_logs | bool

---
# install PyMySQL
- name: Install PyMySQL
  become: true
  ansible.builtin.pip:
    name: PyMySQL

- name: Check for installed MySQL packages that conflict with MariaDB  # noqa: command-instead-of-module
  ansible.builtin.shell:
    cmd: set -o pipefail && rpm -qa 'mysql-*' --qf '%{NAME}\n' | grep -v -e connector -e selinux
  register: _mysql_packages
  changed_when: false
  failed_when: false

- name: Remove conflicting MySQL packages
  become: true
  ansible.builtin.package:
    name: "{{ _mysql_packages.stdout_lines }}"
    state: absent
  when: _mysql_packages.stdout_lines | length > 0

- name: Reset mysql module stream to avoid MariaDB conflict
  become: true
  ansible.builtin.command:
    cmd: dnf module reset mysql -y
  register: _mysql_module_reset
  changed_when: "'Nothing to do' not in _mysql_module_reset.stdout"
  when: ansible_distribution_major_version | int < 10

- name: Enable mariadb module stream
  become: true
  ansible.builtin.command:
    cmd: dnf module enable mariadb -y
  register: _mariadb_module_enable
  changed_when: "'Nothing to do' not in _mariadb_module_enable.stdout"
  when: ansible_distribution_major_version | int < 10

- name: Install local server (MariaDB) and client libs
  become: true
  ansible.builtin.package:
    name:
      - mariadb-server
      - mariadb
    state: present

- name: Start and enable MariaDB
  become: true
  ansible.builtin.systemd:
    name: mariadb
    state: started
    enabled: true

- name: Wait for the MariaDB socket
  ansible.builtin.wait_for:
    path: /var/lib/mysql/mysql.sock
    state: present
    timeout: 60

- name: Pick root password to set/use
  ansible.builtin.set_fact:
    aa_mysql_root_password_effective: "{{ aa_mysql_root_password | default(aa_mysql_password) }}"

# Use socket auth as root (implicit admin) so we don't need an existing password
- name: Ensure MySQL root has a password (idempotent)
  community.mysql.mysql_user:
    name: root
    host: localhost
    password: "{{ aa_mysql_root_password_effective }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
    login_user: root
    login_password: "{{ aa_mysql_root_password_effective }}"
    check_implicit_admin: true

- name: "Create database (local socket): {{ aa_mysql_database }}"
  community.mysql.mysql_db:
    name: "{{ aa_mysql_database }}"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
    login_user: root
    login_password: "{{ aa_mysql_root_password_effective }}"
    check_implicit_admin: true

- name: Create AA application user and grant privileges (local socket)
  community.mysql.mysql_user:
    name: "{{ aa_mysql_user }}"
    password: "{{ aa_mysql_password }}"
    host: "%"
    priv: "{{ aa_mysql_database }}.*:ALL,GRANT"
    state: present
    login_unix_socket: /var/lib/mysql/mysql.sock
    login_user: root
    login_password: "{{ aa_mysql_root_password_effective }}"
    check_implicit_admin: true

---
# Unified AA deployment with per-instance services

# The installation location is used to prepare the various aa services needed in a deployment
- name: Ensure installation directory exists
  become: true
  ansible.builtin.file:
    path: "{{ aa_install_location }}"
    state: directory
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0755'

# The deploy location is the final location consisting of the configured and runnable instances of the aa services
- name: Ensure deploy directory exists
  become: true
  ansible.builtin.file:
    path: "{{ aa_deploy_location }}"
    state: directory
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0755'

# Stop old monolithic service if it exists (migration from legacy single-service setup)
- name: Check if old monolithic AA service unit file exists
  ansible.builtin.stat:
    path: /etc/systemd/system/{{ aa_service_prefix }}.service
  register: legacy_service_status

- name: Stop old monolithic AA service if running
  become: true
  ansible.builtin.systemd:
    name: "{{ aa_service_prefix }}.service"
    state: stopped
    daemon_reload: true
  when: legacy_service_status.stat.exists

# Stop existing per-instance services before re-deploy
- name: Check if AA instance services exist  # noqa: no-handler
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ aa_service_prefix }}_{{ item }}.service"
  loop:
    - mgmt
    - engine
    - etl
    - retrieval
  register: aa_instance_services
  when: _repo.changed

- name: Stop AA instance services for re-deploy  # noqa: no-handler
  become: true
  ansible.builtin.systemd:
    name: "{{ aa_service_prefix }}_{{ item.item }}.service"
    state: stopped
    daemon_reload: true
  loop: "{{ aa_instance_services.results | default([]) }}"
  when: _repo.changed and item.stat.exists

# Prepare the Archiver binaries for installation
- name: Find service package  # noqa: no-handler
  become: true
  ansible.builtin.find:
    paths: "{{ aa_build_loc }}"
    patterns: "archappl*tar.gz"
    recurse: true
  register: find_result
  when: _repo.changed

- name: Unpack service on remote host  # noqa: no-handler
  become: true
  ansible.builtin.unarchive:
    src: "{{ find_result.files[0].path }}"
    dest: "{{ aa_install_location }}"
    remote_src: true
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  when: _repo.changed

- name: Set owner and group on install location  # noqa: no-handler
  become: true
  ansible.builtin.file:
    path: "{{ aa_install_location }}"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    recurse: true
  when: _repo.changed

# Deploy installation and configuration scripts
- name: Deploy single installation script  # noqa: no-handler
  become: true
  ansible.builtin.template:
    src: single_machine_install.sh
    dest: "{{ aa_install_location }}/install_scripts/"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0755'
  when: _repo.changed

- name: Deploy mysql config script  # noqa: no-handler
  become: true
  ansible.builtin.template:
    src: addMysqlConnPool.py
    dest: "{{ aa_install_location }}/install_scripts/"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0755'
  when: _repo.changed

- name: Deploy tomcat installation script  # noqa: no-handler
  become: true
  ansible.builtin.template:
    src: deployMultipleTomcats.py
    dest: "{{ aa_install_location }}/install_scripts/"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0755'
  when: _repo.changed

- name: Copy MySQL schema file from source to install scripts  # noqa: no-handler
  become: true
  ansible.builtin.copy:
    src: "{{ aa_build_loc }}/epicsarchiverap/src/main/org/epics/archiverappliance/config/persistence/archappl_mysql.sql"
    dest: "{{ aa_install_location }}/install_scripts/archappl_mysql.sql"
    remote_src: true
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0644'
  when: _repo.changed

- name: Deploy policies configuration  # noqa: no-handler
  become: true
  ansible.builtin.template:
    src: policies.py
    dest: "{{ aa_install_location }}/conf/"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0644'
  when: _repo.changed

# Deploy appliances.xml for cluster configuration (only when cluster appliances are defined)
- name: Deploy appliances.xml configuration
  become: true
  ansible.builtin.template:
    src: appliances.xml.j2
    dest: "{{ aa_deploy_location }}/appliances.xml"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0644'
  when: aa_cluster_appliances is defined and aa_cluster_appliances | length > 0

# Run the Install script with unified environment variables
- name: Install AA  # noqa: no-changed-when no-handler
  become: true
  ansible.builtin.command:
    chdir: "{{ aa_install_location }}/install_scripts"
    cmd: "{{ aa_install_location }}/install_scripts/single_machine_install.sh"
  environment:
    DEPLOY_DIR: "{{ aa_deploy_location }}"
    JAVA_HOME: "{{ aa_java_home }}"
    TOMCAT_HOME: "{{ aa_tomcat_home }}"
    MYSQL_CLIENT_JAR: "{{ aa_mysql_connector_jar }}"
    MYSQL_CONNECTION_STRING: "--host={{ aa_mysql_server }} --user={{ aa_mysql_user }} --password={{ aa_mysql_password }} --database={{ aa_mysql_database }}"
    SITE_SPECIFIC_POLICIES_FILE: "{{ aa_install_location }}/conf/policies.py"
    ARCHAPPL_MYIDENTITY: "{{ aa_identity }}"
    ARCHAPPL_APPLIANCES: "{{ aa_deploy_location ~ '/appliances.xml' if (aa_cluster_appliances is defined and aa_cluster_appliances | length > 0) else '' }}"
  when: _repo.changed

- name: Deploy facility template changes  # noqa: no-handler
  become: true
  ansible.builtin.template:
    src: facility_template_changes.html
    dest: "/tmp/facility_template_changes.html"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: '0644'
  when: _repo.changed

# Configure site specific content
- name: Configure static AA content  # noqa: no-changed-when no-handler
  become: true
  ansible.builtin.command:
    chdir: "{{ aa_install_location }}/install_scripts"
    cmd: >-
      java -cp ${DEPLOY_DIR}/mgmt/webapps/mgmt/WEB-INF/classes:${DEPLOY_DIR}/mgmt/webapps/mgmt/WEB-INF/lib/log4j-1.2-api-*.jar
      org.epics.archiverappliance.mgmt.bpl.SyncStaticContentHeadersFooters
      /tmp/facility_template_changes.html ${DEPLOY_DIR}/mgmt/webapps/mgmt/ui
  environment:
    DEPLOY_DIR: "{{ aa_deploy_location }}"
    PATH: "{{ aa_java_home }}/bin:${PATH}"
  when: _repo.changed

# A temporary fix for the mysql connection host
- name: Replace mysql host string  # noqa: no-handler
  become: true
  ansible.builtin.replace:
    path: "{{ aa_deploy_location }}/mgmt/conf/context.xml"
    regexp: 'jdbc:mariadb://localhost:3306'
    replace: "jdbc:mariadb://{{ aa_mysql_server }}:3306"
  when: _repo.changed

# Deploy per-instance server.xml (adds optional SSL connector and health check valve)
- name: Deploy server.xml for each instance
  become: true
  ansible.builtin.template:
    src: aa_server.xml.j2
    dest: "{{ aa_deploy_location }}/{{ item.name }}/conf/server.xml"
    mode: '0644'
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  loop:
    - { name: 'mgmt', http_port: '{{ mgmt_port }}', ssl_port: '{{ aa_ssl_port_mgmt }}', shutdown_port: '16001' }
    - { name: 'engine', http_port: '{{ engine_port }}', ssl_port: '{{ aa_ssl_port_engine }}', shutdown_port: '16002' }
    - { name: 'etl', http_port: '{{ etl_port }}', ssl_port: '{{ aa_ssl_port_etl }}', shutdown_port: '16003' }
    - { name: 'retrieval', http_port: '{{ data_retrieval_port }}', ssl_port: '{{ aa_ssl_port_retrieval }}', shutdown_port: '16004' }
  vars:
    aa_instance_http_port: "{{ item.http_port }}"
    aa_instance_ssl_port: "{{ item.ssl_port }}"
    aa_shutdown_port: "{{ item.shutdown_port }}"
  notify: Restart AA instance services

# Deploy per-instance startup scripts
- name: Deploy startup script for each instance
  become: true
  ansible.builtin.template:
    src: instance_startup.sh.j2
    dest: "{{ aa_deploy_location }}/{{ aa_service_prefix }}_{{ item.name }}_startup.sh"
    mode: '0755'
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
  loop:
    - { name: 'mgmt', java_opts: '{{ aa_java_opts_mgmt }}' }
    - { name: 'engine', java_opts: '{{ aa_java_opts_engine }}' }
    - { name: 'etl', java_opts: '{{ aa_java_opts_etl }}' }
    - { name: 'retrieval', java_opts: '{{ aa_java_opts_retrieval }}' }
  vars:
    aa_instance_name: "{{ item.name }}"
    aa_java_opts: "{{ item.java_opts }}"
  notify: Restart AA instance services

# Fix permissions for deploy
- name: Set owner and group on deploy location  # noqa: no-handler
  become: true
  ansible.builtin.file:
    path: "{{ aa_deploy_location }}"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    recurse: true
  when: _repo.changed

# Deploy per-instance systemd service files
- name: Deploy systemd service file for each instance
  become: true
  ansible.builtin.template:
    src: aa_instance.service.j2
    dest: "/etc/systemd/system/{{ aa_service_prefix }}_{{ item }}.service"
    mode: '0644'
    owner: root
    group: root
  loop:
    - mgmt
    - engine
    - etl
    - retrieval
  vars:
    aa_instance_name: "{{ item }}"
  notify: Restart AA instance services

# Ensure AA instances are running and enabled
- name: Start and enable instance services
  become: true
  ansible.builtin.systemd:
    state: started
    enabled: true
    name: "{{ aa_service_prefix }}_{{ item }}.service"
  loop:
    - mgmt
    - engine
    - etl
    - retrieval

# Optional: clean up old monolithic service (opt-in)
- name: Disable and stop old monolithic AA service
  become: true
  ansible.builtin.systemd:
    name: "{{ aa_service_prefix }}.service"
    state: stopped
    enabled: false
    daemon_reload: true
  when: aa_cleanup_legacy_service | bool and legacy_service_status.stat.exists

- name: Remove old monolithic AA service unit file
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ aa_service_prefix }}.service"
    state: absent
  when: aa_cleanup_legacy_service | bool and legacy_service_status.stat.exists

- name: Remove old monolithic startup script
  become: true
  ansible.builtin.file:
    path: "{{ aa_deploy_location }}/{{ aa_service_prefix }}_startup.sh"
    state: absent
  when: aa_cleanup_legacy_service | bool

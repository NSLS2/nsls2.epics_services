---

- name: Ensure basedir exists
  ansible.builtin.file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: '0755'
    state: directory
  loop:
    - "{{ cs_studio_opis_config.basedir | dirname }}"
    - "{{ cs_studio_opis_config.basedir }}"

- name: Install all cs-studio-repos
  ansible.builtin.include_tasks: opis.yml
  loop: "{{ cs_studio_opis_config.repos | product(cs_studio_opis_config.version) | list }}"
  loop_control:
    loop_var: _repo

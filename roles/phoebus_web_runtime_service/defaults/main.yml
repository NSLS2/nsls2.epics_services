---
# defaults file for phoebus_web_runtime_service
#
# Override organization-specific values in your inventory:
#   pvws_repo: "https://github.com/your-org/pvws.git"
#   dbwr_repo: "https://github.com/your-org/dbwr.git"

epics_services_account: csstudio

# java_home provided by jdk_dependency
# mvn_home provided by maven_dependency

epics_ca_addr_list: localhost
epics_ca_max_array_bytes: 1000000

tomcat_dest: /usr/share/tomcat
tomcat_service_name: tomcat

# PVWS (PV Web Socket) configuration
pvws_repo: "https://github.com/ControlSystemStudio/pvws.git"
pvws_version: main
pvws_dest: /opt/css/pvws

# DBWR (Display Builder Web Runtime) configuration
dbwr_repo: "https://github.com/ControlSystemStudio/dbwr.git"
dbwr_version: main
dbwr_dest: /opt/css/dbwr

---
# tasks file for shift_service

- name: Install JDK 8 dependency
  ansible.builtin.include_role:
    name: nsls2.epics_services.jdk8_dependency

- name: Install MariaDB JDBC dependency
  ansible.builtin.include_role:
    name: nsls2.epics_services.mariadb_dependency

- name: Ensure services directory exists
  become: true
  ansible.builtin.file:
    path: "{{ shift_install_dir }}"
    state: directory
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: "0755"

- name: Install GlassFish 5.0.1
  ansible.builtin.unarchive:
    src: http://download.oracle.com/glassfish/5.0.1/release/glassfish-5.0.1.zip
    dest: "{{ shift_install_dir }}/"
    remote_src: true
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    creates: "{{ shift_install_dir }}/glassfish5/bin/asadmin"

- name: Install the fixed bootstrap file
  ansible.builtin.copy:
    src: grizzly-npn-bootstrap.jar
    dest: "{{ shift_install_dir }}/glassfish5/glassfish/modules/endorsed/grizzly-npn-bootstrap.jar"
    force: true
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: "0644"

- name: Set AS_JAVA in GlassFish asenv.conf
  become: true
  ansible.builtin.lineinfile:
    path: "{{ shift_install_dir }}/glassfish5/glassfish/config/asenv.conf"
    regexp: '^AS_JAVA='
    line: 'AS_JAVA="{{ shift_java_home }}"'
  notify: Restart shift_glassfish

# Install JDBC connectors and third party libraries
- name: Install JDBC connectors and third party libraries
  ansible.builtin.include_tasks: install_connectors.yml

# Setup and configure the MySQL server
- name: Setup and configure the MySQL server
  ansible.builtin.include_tasks: configure_mysql.yml
  when: configure_mysql

# Setup the domain.xml
- name: Setup GlassFish domain.xml
  become: true
  ansible.builtin.template:
    src: domain.xml
    dest: "{{ shift_install_dir }}/glassfish5/glassfish/domains/domain1/config/domain.xml"
    mode: "0644"
  notify: Restart shift_glassfish

# Install shift war
- name: Download shift war
  ansible.builtin.get_url:
    url: https://sourceforge.net/projects/olog/files/shift/Shift-1.1.war/download
    dest: "{{ shift_install_dir }}/glassfish5/glassfish/domains/domain1/autodeploy/Shift-1.1.war"
    owner: "{{ epics_services_account }}"
    group: "{{ epics_services_account }}"
    mode: "0644"

# Setup systemd service file
- name: Create systemd service file
  become: true
  ansible.builtin.template:
    src: glassfish.service
    dest: /etc/systemd/system/shift_glassfish.service
    mode: "0644"
    owner: root
    group: root
  notify:
    - Reload systemd daemon
    - Restart shift_glassfish

- name: Enable shift_glassfish service
  become: true
  ansible.builtin.systemd:
    name: shift_glassfish
    enabled: true
    daemon_reload: true

---
# tasks file for nodejs_dependency

- name: Skip if already checked this play
  ansible.builtin.meta: end_role
  when: _nodejs_dependency_done | default(false)

- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: "https://rpm.nodesource.com/setup_{{ nodejs_version }}.x"
    dest: /tmp/nodesource_setup.sh
    mode: "0755"

- name: Run NodeSource setup script
  ansible.builtin.command: bash /tmp/nodesource_setup.sh
  args:
    creates: /etc/yum.repos.d/nodesource-nodejs.repo

- name: Install Node.js
  ansible.builtin.package:
    name: nodejs
    state: present

- name: Install serve globally via npm
  community.general.npm:
    name: serve
    global: true

- name: Mark nodejs dependency done
  ansible.builtin.set_fact:
    _nodejs_dependency_done: true

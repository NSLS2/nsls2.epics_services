---
# tasks file for nodejs_dependency

- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: "https://rpm.nodesource.com/setup_{{ nodejs_version }}.x"
    dest: /tmp/nodesource_setup.sh
    mode: "0755"

- name: Run NodeSource setup script
  ansible.builtin.command: bash /tmp/nodesource_setup.sh
  args:
    creates: /etc/yum.repos.d/nodesource-el9.repo
  changed_when: true

- name: Install Node.js
  ansible.builtin.package:
    name: nodejs
    state: present

- name: Install serve globally via npm
  community.general.npm:
    name: serve
    global: true

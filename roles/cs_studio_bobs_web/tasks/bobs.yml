---

- name: Ensure proxy is unset
  community.general.git_config:
    repo: "{{ cs_studio_bobs_web_config.basedir + '/production/' + _repo.0 }}"
    name: "{{ item }}.proxy"
    state: absent
    scope: local
  register: result
  loop:
    - http
    - https
  failed_when: false

- name: Clone bob repo
  ansible.builtin.git:
    repo: "{{ cs_studio_bobs_web_config.base_repo + '/' + _repo.0 + '.git' }}"
    dest: "{{ cs_studio_bobs_web_config.basedir + '/production/' + _repo.0 }}"
    version: "{{ _repo.1 }}"
    update: true
  register: _bob_clone

- name: Fix permissions after clone  # noqa: no-handler
  ansible.builtin.file:
    dest: "{{ cs_studio_bobs_web_config.basedir + '/production/' + _repo.0 }}"
    owner: root
    group: root
    mode: "u=rwX,g=rX,o=rX"
    recurse: true
  when: _bob_clone.changed

---
- name: Load shared collection defaults
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../../vars/shared.yml"


- name: Install all cs-studio-repos
  ansible.builtin.include_tasks: bobs.yml
  loop: "{{ cs_studio_bobs_web_config.repos | product(cs_studio_bobs_web_config.version) | list }}"
  loop_control:
    loop_var: _repo
